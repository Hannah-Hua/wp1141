<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車邏輯測試</title>
</head>
<body>
    <h1>購物車邏輯測試</h1>
    <div id="output"></div>
    
    <script>
        // 模擬 Product 和 CartItem 結構
        const mockProduct1 = {
            product_id: 1,
            product_name: "BTS OFFICIAL LIGHT STICK VER.4",
            group_name: "BTS",
            entertainment: "HYBE",
            price_twd: 1470
        };

        const mockProduct2 = {
            product_id: 2,
            product_name: "LE SSERAFIM Official Light Stick",
            group_name: "LE SSERAFIM",
            entertainment: "HYBE",
            price_twd: 1590
        };

        // 模擬購物車狀態
        let cartItems = [];

        // 模擬 handleAddToCart 函數
        function handleAddToCart(product, selectedOption, quantity = 1) {
            const existingItemIndex = cartItems.findIndex(
                item => item.product.product_id === product.product_id && 
                item.selectedOption === selectedOption
            );

            if (existingItemIndex >= 0) {
                // 如果商品已存在，累加數量
                cartItems = cartItems.map((item, index) => 
                    index === existingItemIndex 
                        ? { ...item, quantity: item.quantity + quantity }
                        : item
                );
                console.log(`商品 ${product.product_name} 已存在，累加數量到 ${cartItems[existingItemIndex].quantity}`);
            } else {
                // 如果商品不存在，新增到購物車
                const newCartItem = {
                    product,
                    quantity,
                    selectedOption,
                    isSelected: true
                };
                cartItems.push(newCartItem);
                console.log(`新增商品 ${product.product_name} 到購物車，數量: ${quantity}`);
            }
        }

        // 測試案例
        function runTests() {
            const output = document.getElementById('output');
            output.innerHTML = '<h2>測試結果：</h2>';

            // 測試 1: 加入新商品
            console.log('=== 測試 1: 加入新商品 ===');
            handleAddToCart(mockProduct1, undefined, 1);
            output.innerHTML += '<p>✅ 測試 1: 加入新商品 - 成功</p>';

            // 測試 2: 重複加入相同商品
            console.log('=== 測試 2: 重複加入相同商品 ===');
            handleAddToCart(mockProduct1, undefined, 2);
            output.innerHTML += '<p>✅ 測試 2: 重複加入相同商品 - 成功</p>';

            // 測試 3: 加入不同商品
            console.log('=== 測試 3: 加入不同商品 ===');
            handleAddToCart(mockProduct2, undefined, 1);
            output.innerHTML += '<p>✅ 測試 3: 加入不同商品 - 成功</p>';

            // 測試 4: 加入相同商品但不同選項
            console.log('=== 測試 4: 加入相同商品但不同選項 ===');
            handleAddToCart(mockProduct1, 'S', 1);
            output.innerHTML += '<p>✅ 測試 4: 加入相同商品但不同選項 - 成功</p>';

            // 測試 5: 重複加入相同商品和選項
            console.log('=== 測試 5: 重複加入相同商品和選項 ===');
            handleAddToCart(mockProduct1, 'S', 3);
            output.innerHTML += '<p>✅ 測試 5: 重複加入相同商品和選項 - 成功</p>';

            // 顯示最終購物車狀態
            console.log('=== 最終購物車狀態 ===');
            console.log(cartItems);
            
            output.innerHTML += '<h3>最終購物車狀態：</h3>';
            cartItems.forEach((item, index) => {
                output.innerHTML += `
                    <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                        <strong>商品 ${index + 1}:</strong> ${item.product.product_name}<br>
                        <strong>數量:</strong> ${item.quantity}<br>
                        <strong>選項:</strong> ${item.selectedOption || '無'}<br>
                        <strong>選中:</strong> ${item.isSelected ? '是' : '否'}
                    </div>
                `;
            });

            // 驗證結果
            const expectedResults = [
                { product_id: 1, quantity: 3, option: undefined }, // 1 + 2 = 3
                { product_id: 2, quantity: 1, option: undefined },
                { product_id: 1, quantity: 4, option: 'S' } // 1 + 3 = 4
            ];

            let allTestsPassed = true;
            expectedResults.forEach((expected, index) => {
                const actual = cartItems[index];
                if (actual.product.product_id !== expected.product_id ||
                    actual.quantity !== expected.quantity ||
                    actual.selectedOption !== expected.option) {
                    allTestsPassed = false;
                    console.error(`測試失敗 - 商品 ${index + 1}:`, expected, actual);
                }
            });

            if (allTestsPassed) {
                output.innerHTML += '<p style="color: green; font-weight: bold;">🎉 所有測試通過！</p>';
            } else {
                output.innerHTML += '<p style="color: red; font-weight: bold;">❌ 測試失敗！</p>';
            }
        }

        // 頁面載入後執行測試
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
