<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端地圖測試</title>
    <style>
        body { margin: 20px; font-family: Arial, sans-serif; }
        #map { height: 400px; width: 100%; border: 1px solid #ccc; margin: 20px 0; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #d1ecf1; color: #0c5460; }
        .info { background: #e2e3e5; color: #383d41; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>前端地圖載入測試</h1>
    
    <div class="status info">
        <h3>🔑 API Key 資訊</h3>
        <p><strong>API Key:</strong> <span id="api-key"></span></p>
        <p><strong>載入狀態:</strong> <span id="load-status">準備中...</span></p>
    </div>

    <div class="status loading" id="loading-status">
        <h3>⏳ 正在載入 Google Maps...</h3>
        <p>如果載入時間超過 10 秒，請檢查瀏覽器控制台是否有錯誤訊息。</p>
    </div>

    <div id="map"></div>

    <div class="status info">
        <h3>🧪 測試按鈕</h3>
        <button onclick="testMapInteraction()">測試地圖互動</button>
        <button onclick="addTestMarker()">加入測試標記</button>
        <button onclick="checkMapStatus()">檢查地圖狀態</button>
    </div>

    <div class="status info">
        <h3>📝 日誌</h3>
        <div id="log" class="log"></div>
        <button onclick="clearLog()">清除日誌</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyAtw3HZu2HmnAzhU1sB3_R3DJo5EmroRQg';
        let map = null;
        let markers = [];
        let logElement = document.getElementById('log');
        
        // 顯示 API Key
        document.getElementById('api-key').textContent = API_KEY.substring(0, 10) + '...';
        
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logElement.textContent += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            logElement.textContent = '';
        }
        
        function updateLoadStatus(status) {
            document.getElementById('load-status').textContent = status;
        }
        
        function updateLoadingStatus(message, type = 'loading') {
            const element = document.getElementById('loading-status');
            element.innerHTML = `<h3>${message}</h3>`;
            element.className = `status ${type}`;
        }
        
        // 設定全域錯誤處理
        window.gm_authFailure = function() {
            log('❌ Google Maps 認證失敗！');
            updateLoadStatus('認證失敗');
            updateLoadingStatus('❌ Google Maps 認證失敗！', 'error');
        };
        
        // 載入成功回調
        window.initMap = function() {
            try {
                log('✅ Google Maps API 載入成功');
                updateLoadStatus('載入成功');
                updateLoadingStatus('✅ Google Maps 載入成功！', 'success');
                
                // 建立地圖
                map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 25.0330, lng: 121.5654 }, // 台北101
                    zoom: 15,
                    mapTypeControl: true,
                    streetViewControl: true,
                    fullscreenControl: true
                });
                
                log('✅ 地圖建立成功');
                
                // 加入台北101標記
                const marker = new google.maps.Marker({
                    position: { lat: 25.0330, lng: 121.5654 },
                    map: map,
                    title: '台北101',
                    animation: google.maps.Animation.DROP
                });
                
                markers.push(marker);
                log('✅ 標記加入成功');
                
                // 地圖點擊事件
                map.addListener('click', function(e) {
                    log(`地圖點擊: ${e.latLng.lat()}, ${e.latLng.lng()}`);
                });
                
                // 標記點擊事件
                marker.addListener('click', function() {
                    log('標記被點擊: 台北101');
                });
                
                log('✅ 所有事件監聽器設定完成');
                
            } catch (error) {
                log('❌ 地圖建立失敗: ' + error.message);
                updateLoadStatus('建立失敗');
                updateLoadingStatus('❌ 地圖建立失敗: ' + error.message, 'error');
            }
        };
        
        // 載入 Google Maps API
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=places&callback=initMap`;
        script.async = true;
        script.defer = true;
        
        script.onerror = function() {
            log('❌ Google Maps API 腳本載入失敗');
            updateLoadStatus('腳本載入失敗');
            updateLoadingStatus('❌ Google Maps API 腳本載入失敗！', 'error');
        };
        
        script.onload = function() {
            log('✅ Google Maps API 腳本載入完成');
        };
        
        document.head.appendChild(script);
        
        // 測試函數
        function testMapInteraction() {
            if (!map) {
                log('❌ 地圖尚未載入');
                return;
            }
            
            log('🧪 測試地圖互動...');
            
            // 測試縮放
            const currentZoom = map.getZoom();
            log(`當前縮放級別: ${currentZoom}`);
            
            // 測試中心點
            const center = map.getCenter();
            log(`當前中心點: ${center.lat()}, ${center.lng()}`);
            
            // 測試地圖類型
            const mapType = map.getMapTypeId();
            log(`當前地圖類型: ${mapType}`);
            
            log('✅ 地圖互動測試完成');
        }
        
        function addTestMarker() {
            if (!map) {
                log('❌ 地圖尚未載入');
                return;
            }
            
            // 隨機位置
            const lat = 25.0330 + (Math.random() - 0.5) * 0.01;
            const lng = 121.5654 + (Math.random() - 0.5) * 0.01;
            
            const marker = new google.maps.Marker({
                position: { lat: lat, lng: lng },
                map: map,
                title: '測試標記',
                animation: google.maps.Animation.BOUNCE
            });
            
            markers.push(marker);
            log(`✅ 測試標記已加入: ${lat.toFixed(6)}, ${lng.toFixed(6)}`);
        }
        
        function checkMapStatus() {
            log('🔍 檢查地圖狀態...');
            log(`地圖物件: ${map ? '存在' : '不存在'}`);
            log(`標記數量: ${markers.length}`);
            log(`API Key: ${API_KEY.substring(0, 10)}...`);
            log(`當前網址: ${window.location.href}`);
            log(`User Agent: ${navigator.userAgent.substring(0, 100)}...`);
        }
        
        // 設定超時
        setTimeout(() => {
            if (document.getElementById('load-status').textContent === '準備中...') {
                log('⏰ 載入超時（10秒）');
                updateLoadStatus('超時');
                updateLoadingStatus('⏰ 載入超時（10秒）', 'error');
            }
        }, 10000);
        
        // 頁面載入時記錄
        log('頁面載入完成，開始載入 Google Maps API');
    </script>
</body>
</html>
