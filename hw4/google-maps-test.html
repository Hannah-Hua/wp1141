<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps 測試</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        #map { height: 400px; width: 100%; border: 1px solid #ccc; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Google Maps API 測試</h1>
    
    <div id="status" class="status loading">正在載入 Google Maps...</div>
    
    <div id="map"></div>
    
    <div id="info">
        <h3>測試資訊</h3>
        <p><strong>API Key:</strong> <span id="api-key"></span></p>
        <p><strong>載入狀態:</strong> <span id="load-status"></span></p>
        <p><strong>錯誤訊息:</strong> <span id="error-msg"></span></p>
    </div>

    <script>
        // 顯示 API Key（隱藏部分）
        const apiKey = 'AIzaSyAtw3HZu2HmnAzhU1sB3_R3DJo5EmroRQg';
        document.getElementById('api-key').textContent = apiKey.substring(0, 10) + '...';
        
        const statusEl = document.getElementById('status');
        const loadStatusEl = document.getElementById('load-status');
        const errorMsgEl = document.getElementById('error-msg');
        
        function updateStatus(message, type = 'loading') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        function updateLoadStatus(status) {
            loadStatusEl.textContent = status;
        }
        
        function updateError(error) {
            errorMsgEl.textContent = error || '無';
        }
        
        // 載入 Google Maps API
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places&callback=initMap`;
        script.async = true;
        script.defer = true;
        
        // 設定全域錯誤處理
        window.gm_authFailure = function() {
            updateStatus('❌ Google Maps 認證失敗！請檢查 API Key 和限制設定', 'error');
            updateLoadStatus('認證失敗');
            updateError('gm_authFailure 被呼叫');
        };
        
        // 載入成功回調
        window.initMap = function() {
            try {
                updateStatus('✅ Google Maps 載入成功！', 'success');
                updateLoadStatus('載入成功');
                updateError('');
                
                // 建立地圖
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 25.0330, lng: 121.5654 }, // 台北101
                    zoom: 15
                });
                
                // 加入標記
                new google.maps.Marker({
                    position: { lat: 25.0330, lng: 121.5654 },
                    map: map,
                    title: '台北101'
                });
                
                updateStatus('✅ 地圖建立成功！', 'success');
                
            } catch (error) {
                updateStatus('❌ 地圖建立失敗: ' + error.message, 'error');
                updateLoadStatus('建立失敗');
                updateError(error.message);
            }
        };
        
        // 載入失敗處理
        script.onerror = function() {
            updateStatus('❌ Google Maps API 載入失敗！', 'error');
            updateLoadStatus('載入失敗');
            updateError('script.onerror 被觸發');
        };
        
        // 開始載入
        document.head.appendChild(script);
        
        // 設定超時
        setTimeout(() => {
            if (loadStatusEl.textContent === '') {
                updateStatus('⏰ 載入超時（10秒）', 'error');
                updateLoadStatus('超時');
                updateError('載入超過 10 秒');
            }
        }, 10000);
    </script>
</body>
</html>
